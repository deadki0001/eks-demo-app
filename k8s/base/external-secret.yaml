apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-2
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: lsd-db-credentials
  namespace: lsd-payments
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: lsd-db-credentials
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: lsd-payments/rds-v2
