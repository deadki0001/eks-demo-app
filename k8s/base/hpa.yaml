apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: lsd-backend-hpa
  namespace: lsd-payments
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: lsd-backend
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: lsd-frontend-hpa
  namespace: lsd-payments
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: lsd-frontend
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
