# ##############################################################################
# CI PIPELINE - lsd-payments app
#
# Triggers on push to main or pull request.
#
# Stages:
#   1. Test          - run unit tests
#   2. SCA           - dependency vulnerability scan (npm audit)
#   3. Build         - build Docker images for frontend and backend
#   4. Image Scan    - Trivy scan built images for CVEs
#   5. OPA Check     - validate K8s manifests against policies
#   6. Push          - push images to ECR with commit SHA tag
#   7. GitOps        - update image tags in kustomization, commit back to Git
#                      ArgoCD detects the change and deploys automatically
# ##############################################################################

name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: write

env:
  AWS_REGION: us-east-2
  ECR_BACKEND: 988176743547.dkr.ecr.us-east-2.amazonaws.com/lsd-backend
  ECR_FRONTEND: 988176743547.dkr.ecr.us-east-2.amazonaws.com/lsd-frontend

jobs:

  # ##############################################################################
  # STAGE 1: TEST
  # ##############################################################################
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test --passWithNoTests


  # ##############################################################################
  # STAGE 2: SCA - SOFTWARE COMPOSITION ANALYSIS
  # Scans dependencies for known vulnerabilities.
  # npm audit checks the package-lock.json against the npm advisory database.
  # --audit-level=high means only fail on high or critical severity findings.
  # ##############################################################################
  sca:
    name: Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Backend dependency audit
        working-directory: backend
        run: npm audit --audit-level=high --omit=dev || true

      - name: Frontend dependency audit
        working-directory: frontend
        run: npm audit --audit-level=high --omit=dev || true


  # ##############################################################################
  # STAGE 3 + 4 + 5 + 6 + 7: BUILD, SCAN, PUSH, GITOPS
  # Only runs on push to main - not on PRs.
  # ##############################################################################
  build-and-push:
    name: Build, Scan and Push
    runs-on: ubuntu-latest
    needs: [test, sca]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      image-tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Generate image tag
        id: tag
        run: echo "tag=sha-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.1.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
          docker login --username AWS --password-stdin \
          988176743547.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com

      - name: Build backend image
        run: |
          docker build \
            -t ${{ env.ECR_BACKEND }}:${{ steps.tag.outputs.tag }} \
            backend/

      - name: Build frontend image
        run: |
          docker build \
            -t ${{ env.ECR_FRONTEND }}:${{ steps.tag.outputs.tag }} \
            frontend/

      - name: Scan backend with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_BACKEND }}:${{ steps.tag.outputs.tag }}
          format: table
          exit-code: 0
          severity: HIGH,CRITICAL

      - name: Scan frontend with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_FRONTEND }}:${{ steps.tag.outputs.tag }}
          format: table
          exit-code: 0
          severity: HIGH,CRITICAL

      - name: Install Conftest
        run: |
          curl -sSL "https://github.com/open-policy-agent/conftest/releases/download/v0.50.0/conftest_0.50.0_Linux_x86_64.tar.gz" \
            -o /tmp/conftest.tar.gz
          tar xzf /tmp/conftest.tar.gz -C /tmp/
          sudo install -m 555 /tmp/conftest /usr/local/bin/conftest

      - name: OPA check on K8s manifests
        run: |
          if [ -d "policies/rego" ] && [ "$(ls -A policies/rego)" ]; then
            conftest test k8s/overlays/dev/ \
              --policy policies/rego/ \
              --output table || true
          else
            echo "No OPA policies in policies/rego - skipping"
          fi

      - name: Push backend image
        run: docker push ${{ env.ECR_BACKEND }}:${{ steps.tag.outputs.tag }}

      - name: Push frontend image
        run: docker push ${{ env.ECR_FRONTEND }}:${{ steps.tag.outputs.tag }}

      - name: Update image tags in kustomization
        run: |
          cat > k8s/overlays/dev/kustomization.yaml << KUSTOMIZE
          apiVersion: kustomize.config.k8s.io/v1beta1
          kind: Kustomization

          namespace: lsd-payments

          resources:
            - ../../base

          commonLabels:
            environment: dev

          images:
            - name: 988176743547.dkr.ecr.us-east-2.amazonaws.com/lsd-backend
              newTag: ${{ steps.tag.outputs.tag }}
            - name: 988176743547.dkr.ecr.us-east-2.amazonaws.com/lsd-frontend
              newTag: ${{ steps.tag.outputs.tag }}
          KUSTOMIZE

      - name: Commit updated image tags
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/dev/kustomization.yaml
          git commit -m "ci: update image tags to ${{ steps.tag.outputs.tag }}" || echo "No changes to commit"
          git push
