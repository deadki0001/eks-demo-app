apiVersion: apps/v1
kind: Deployment
metadata:
  name: lsd-frontend
  namespace: lsd-payments
  labels:
    app: lsd-frontend
    version: latest
    environment: dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lsd-frontend
  template:
    metadata:
      labels:
        app: lsd-frontend
        version: latest
        environment: dev
    spec:
      containers:
        - name: lsd-frontend
          image: 988176743547.dkr.ecr.us-east-2.amazonaws.com/lsd-frontend:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
