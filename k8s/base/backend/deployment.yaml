apiVersion: apps/v1
kind: Deployment
metadata:
  name: lsd-backend
  namespace: lsd-payments
  labels:
    app: lsd-backend
    version: latest
    environment: dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lsd-backend
  template:
    metadata:
      labels:
        app: lsd-backend
        version: latest
        environment: dev
    spec:
      containers:
        - name: lsd-backend
          image: 988176743547.dkr.ecr.us-east-2.amazonaws.com/lsd-backend:latest
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: lsd-db-credentials
                  key: host
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: lsd-db-credentials
                  key: port
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: lsd-db-credentials
                  key: dbname
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: lsd-db-credentials
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lsd-db-credentials
                  key: password
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
